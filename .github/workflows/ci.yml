name: CI

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs: 
  build: 
    name: 'Build and Push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    # strategy:
    #   matrix: 
    #     node: [ 18, 20, 24 ]

    steps: 
    - uses: actions/checkout@v6

    #  - name: Setup node | ${{matrix.node}}
    - name: Setup node
      uses: actions/setup-node@v6
      with:
        # node-version: ${{matrix.node}}
        node-version: 24
        cache: 'npm'
    - run: npm i
    - run: npm run test


    - name: Semantic Release
      uses: cycjimmy/semantic-release-action@v6
      with:
        semantic_version: 19.0.5
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: Generate tag
      id: generate_tag  
      run: |
        SHA=$(echo $GITHUB_SHA | head -c7)
        echo "sha=$SHA" >> $GITHUB_OUTPUT

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        role-to-assume: 'arn:aws:iam::751647213111:role/ecr-role'
        aws-region: us-east-2
    
    - name: Login to AWS ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      id: build-docker-image
      env: 
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.generate_tag.outputs.sha }}
      run: |
        docker build -t $REGISTRY/devops-ci:$TAG .
        docker push $REGISTRY/devops-ci:$TAG
        docker tag $REGISTRY/devops-ci:$TAG $REGISTRY/devops-ci:latest
        docker push $REGISTRY/devops-ci:latest
        IMAGE=$(echo $REGISTRY/devops-ci:$TAG)
        echo "sha=$IMAGE" >> $GITHUB_OUTPUT
    
    - name: Deploy to App Runner
      id: deploy-app-runner
      uses: awslabs/amazon-app-runner-deploy@main
      with:
        service: devops-ci-api
        image: ${{ steps.build-docker-image.outputs.sha }}
        access-role-arn: arn:aws:iam::751647213111:role/app-runner-role
        region: us-east-2
        cpu: 1
        memory: 2
        port: 3000
        wait-for-service-stability-seconds: 1200
    
    - name: App Runner check
      run: echo "App Runner running...${{ steps.deploy-app-runner.outputs.service-url }}"


