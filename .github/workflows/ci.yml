name: CI

on:
  push:
    branches:
      - main

jobs: 
  build: 
    name: 'Build and Push'
    runs-on: ubuntu-latest

    steps: 
    - uses: actions/checkout@v6

    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
    - run: npm i
    - run: npm run test