name: CI

on:
  push:
    branches:
      - main

jobs: 
  build: 
    name: 'Build and Push'
    runs-on: ubuntu-latest
    strategy:
      matrix: 
        node: [ 18, 20, 24 ]

    steps: 
    - uses: actions/checkout@v6

    - name: Setup node | ${{matrix.node}}
      uses: actions/setup-node@v6
      with:
        node-version: ${{matrix.node}}
        cache: 'npm'
    - run: npm i
    - run: npm run test

    - name: Build Docker Image
      run: docker build -t api-ci:latest .