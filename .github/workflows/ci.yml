name: CI

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs: 
  build: 
    name: 'Build and Push'
    runs-on: ubuntu-latest
    # strategy:
    #   matrix: 
    #     node: [ 18, 20, 24 ]

    steps: 
    - uses: actions/checkout@v6

    #  - name: Setup node | ${{matrix.node}}
    - name: Setup node
      uses: actions/setup-node@v6
      with:
        # node-version: ${{matrix.node}}
        node-version: 24
        cache: 'npm'
    - run: npm i
    - run: npm run test

    - name: Generate tag
      id: generate_tag  
      run: |
        SHA=$(echo $GITHUB_SHA | head -c7)
        echo "sha=$SHA" >> $GITHUB_OUTPUT

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        role-to-assume: 'arn:aws:iam::751647213111:role/ecr-role'
        aws-region: us-east-2
    
    - name: Login to AWS ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      id: build-docker-image
      env: 
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.generate_tag.outputs.sha }}
      run: |
        docker build -t $REGISTRY/devops-ci:$TAG .
        docker push $REGISTRY/devops-ci:$TAG
        IMAGE=$(echo $REGISTRY/devops-ci:$TAG)
        echo "sha=$IMAGE" >> $GITHUB_OUTPUT
    
    - name: Deploy to App Runner
      uses: awslabs/amazon-app-runner-deploy@main
      with:
        service: devops-ci-api
        image: ${{ steps.build-docker-image.outputs.image }}
        access-role-arn: arn:aws:iam::751647213111:role/app-runner-role
        source-connection-arn: arn:aws:apprunner:us-east-2:751647213111:connection/devops-ci/148b4c1ef65f40d9b8c5fa33cc026139
        region: us-east-2
        cpu: 1
        memory: 2
        port: 3000




